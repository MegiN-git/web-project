<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Glow & Relax</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">

    <div class="login-container">
        <div class="login-box">
            <div class="logo-area">
                <a href="index.html" class="back-link">← Back</a>
                <h2>Welcome Back</h2>
                <p>Please enter your details to continue</p>
            </div>

            <div class="role-toggle">
                <button id="userBtn" class="active" onclick="setRole('user')">User</button>
                <button id="adminBtn" onclick="setRole('admin')">Admin</button>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="hello@example.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="submit-btn">Login</button>
            </form>

            <p class="signup-prompt">Don't have an account? <a href="#">Sign up</a></p>
        </div>
    </div>

    <script src="../js/main.js"></script>
</body>
</html>
